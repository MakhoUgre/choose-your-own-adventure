<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>თავგადასავალი ტყეში</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a2a1a; /* მუქი მწვანე ტყისფერი */
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .adventure-card {
            background: #2c3e50;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid #27ae60;
        }

        /* საწყისი მისალმება */
        #welcome-msg {
            color: #27ae60;
            font-size: 1.5em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .story-text {
            font-size: 1.3em;
            line-height: 1.6;
            margin: 20px 0 30px 0;
            min-height: 80px;
            color: #f1c40f; /* ოქროსფერი ტექსტი სიუჟეტისთვის */
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            transition: 0.3s;
        }

        .choice-btn:hover {
            background: #2ecc71;
            transform: scale(1.02);
        }

        /* ანიმაცია */
        .fade-in {
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="adventure-card">
    <div id="welcome-msg">მოგესალმებით! 🌲</div>
    
    <div id="story" class="story-text fade-in">
        </div>

    <div id="choices" class="button-group">
        </div>
</div>

<script>
    const storyNodes = {
        start: {
            text: "თქვენ ხართ უღრან ტყეში, გზები იყოფა, მარჯვნივ და მარცხნივ, თქვენ საით წახვალთ?",
            choices: [
                { text: "მარცხნივ ⬅️", nextNode: 'left' },
                { text: "მარჯვნივ ➡️", nextNode: 'right' }
            ]
        },
        left: {
            text: "თქვენ მიადექით მდინარეს. შეგიძლიათ შემოუაროთ მას ფეხით ან გადაცუროთ. რას იზამთ?",
            choices: [
                { text: "შემოვლა (ფეხით)", nextNode: 'walk' },
                { text: "გადაცურვა", nextNode: 'swim' }
            ]
        },
        swim: {
            text: "თქვენ გადაცურეთ მდინარე, მაგრამ ალიგატორმა შეგჭამათ. 🐊 თამაში დასრულდა.",
            choices: [{ text: "სცადე თავიდან 🔄", nextNode: 'start' }]
        },
        walk: {
            text: "თქვენ ბევრი იარეთ, წყალი გაგითავდათ და ძალა გამოგელიათ. წააგეთ. 🏜️",
            choices: [{ text: "სცადე თავიდან 🔄", nextNode: 'start' }]
        },
        right: {
            text: "თქვენ მიადექით ძველ ხიდს. გსურთ გადაკვეთოთ იგი თუ უკან დაბრუნდეთ?",
            choices: [
                { text: "ხიდზე გადასვლა", nextNode: 'cross' },
                { text: "უკან დაბრუნება", nextNode: 'back' }
            ]
        },
        back: {
            text: "თქვენ დაბრუნდით და ტყეში გზა აგერიათ. წააგეთ. 🔄",
            choices: [{ text: "სცადე თავიდან 🔄", nextNode: 'start' }]
        },
        cross: {
            text: "ხიდის მეორე მხარეს უცნობს შეხვდით. დაელაპარაკებით მას?",
            choices: [
                { text: "დიახ, დაველაპარაკები", nextNode: 'yes' },
                { text: "არა, გავატარებ", nextNode: 'no' }
            ]
        },
        yes: {
            text: "თქვენ დაელაპარაკეთ უცნობს, მან ოქრო მოგცათ. თქვენ გაიმარჯვეთ! 💰🏆",
            choices: [{ text: "ითამაშე თავიდან 🎮", nextNode: 'start' }]
        },
        no: {
            text: "თქვენ უგულებელყავით უცნობი, ის განაწყენდა და გზა დაგიკეტათ. წააგეთ. 😠",
            choices: [{ text: "სცადე თავიდან 🔄", nextNode: 'start' }]
        }
    };

    function showNode(nodeIndex) {
        const node = storyNodes[nodeIndex];
        const storyElement = document.getElementById('story');
        const choicesElement = document.getElementById('choices');
        const welcomeMsg = document.getElementById('welcome-msg');

        // თუ თამაში თავიდან იწყება, გამოვაჩინოთ მისალმება, სხვა შემთხვევაში დავმალოთ
        if (nodeIndex === 'start') {
            welcomeMsg.style.display = "block";
        } else {
            welcomeMsg.style.display = "none";
        }

        // ტექსტის განახლება
        storyElement.innerText = node.text;

        // ღილაკების შექმნა
        choicesElement.innerHTML = '';
        node.choices.forEach(choice => {
            const button = document.createElement('button');
            button.innerText = choice.text;
            button.classList.add('choice-btn');
            button.onclick = () => showNode(choice.nextNode);
            choicesElement.appendChild(button);
        });
    }

    // სტარტი
    showNode('start');
</script>

</body>
</html>
